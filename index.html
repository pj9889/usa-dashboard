<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jacklyn Pro Dashboard | Nexus Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #05070a;
            --panel: #0d1117;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --card-border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', 'Segoe UI', sans-serif; padding: 20px; overflow-x: hidden; }

        /* Background Animation */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1f2e 0%, #05070a 100%);
            z-index: -1;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* Header Styling */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--panel); padding: 20px 30px; border-radius: 20px;
            border: 1px solid var(--card-border); margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header h1 { font-size: 22px; font-weight: 800; letter-spacing: 1px; display: flex; align-items: center; gap: 12px; }
        .header h1 i { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        .refresh-btn {
            background: linear-gradient(135deg, #00d4ff 0%, #0084ff 100%);
            color: white; border: none; padding: 12px 24px; border-radius: 12px;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 132, 255, 0.4);
        }
        .refresh-btn:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 8px 25px rgba(0, 132, 255, 0.6); }

        /* Section Headings */
        .section-title {
            margin: 40px 0 20px; font-size: 14px; text-transform: uppercase;
            color: var(--text-dim); letter-spacing: 3px; display: flex; align-items: center; gap: 15px;
        }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--card-border); }

        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }

        .card {
            background: var(--panel); padding: 25px; border-radius: 24px;
            border: 1px solid var(--card-border); position: relative;
            transition: all 0.4s ease; overflow: hidden;
            display: flex; flex-direction: column; align-items: flex-start;
        }
        .card:hover {
            border-color: var(--accent); transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), 0 0 20px var(--accent-glow);
        }

        .card .icon-box {
            width: 45px; height: 45px; border-radius: 12px; background: rgba(0, 212, 255, 0.1);
            display: flex; align-items: center; justify-content: center; margin-bottom: 15px;
            color: var(--accent); font-size: 20px;
        }

        .card h3 { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; font-weight: 500; }
        .card .value { font-size: 32px; font-weight: 800; color: #fff; }

        /* Loading Animation */
        .spinning { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 20px; text-align: center; }
            .grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1><i class="fa-solid fa-shield-halved"></i> NEXUS CONTROL PANEL</h1>
            <button class="refresh-btn" onclick="fetchAllData()" id="refreshBtn">
                <i class="fa-solid fa-arrows-rotate" id="syncIcon"></i> SYNC SYSTEM
            </button>
        </div>

        <div class="section-title">Landing Hub Analytics</div>
        <div class="grid">
            <div class="card">
                <div class="icon-box"><i class="fa-solid fa-users-viewfinder"></i></div>
                <h3>Traffic Inflow</h3>
                <div class="value" id="l-vis">0</div>
            </div>
            <div class="card">
                <div class="icon-box"><i class="fa-solid fa-bolt"></i></div>
                <h3>Action Clicks</h3>
                <div class="value" id="l-clk">0</div>
            </div>
            <div class="card">
                <div class="icon-box"><i class="fa-brands fa-chrome"></i></div>
                <h3>Chrome Intel</h3>
                <div class="value" id="l-chr">0</div>
            </div>
        </div>

        <div class="section-title">Core Site Conversion</div>
        <div class="grid">
            <div class="card">
                <div class="icon-box"><i class="fa-solid fa-eye"></i></div>
                <h3>Live Visitors</h3>
                <div class="value" id="m-vis">0</div>
            </div>
            <div class="card">
                <div class="icon-box"><i class="fa-solid fa-comment-nodes"></i></div>
                <h3>Messages Sent</h3>
                <div class="value" id="m-msg">0</div>
            </div>
            <div class="card">
                <div class="icon-box"><i class="fa-solid fa-video"></i></div>
                <h3>Video Requests</h3>
                <div class="value" id="m-vid">0</div>
            </div>
            <div class="card">
                <div class="icon-box"><i class="fa-solid fa-phone-arrow-up-right"></i></div>
                <h3>Re-calls</h3>
                <div class="value" id="m-agn">0</div>
            </div>
            <div class="card" style="border-color: rgba(56, 189, 248, 0.4);">
                <div class="icon-box" style="background: rgba(56, 189, 248, 0.2);"><i class="fa-solid fa-user-plus"></i></div>
                <h3>Accounts Created</h3>
                <div class="value" id="m-reg">0</div>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz0yfOoAweiRoojKmEbDol5Ly83LhnBJlVmXSQj0U8bJ1H74hPKhTkgydZO2TEFLDVT/exec';

        async function fetchAllData() {
            const icon = document.getElementById('syncIcon');
            const btn = document.getElementById('refreshBtn');
            icon.classList.add('spinning');
            btn.style.opacity = '0.7';

            try {
                const lResponse = await fetch(`${SCRIPT_URL}?sheet=LandingData&action=get`);
                const lData = await lResponse.json();
                
                const mResponse = await fetch(`${SCRIPT_URL}?sheet=MainData&action=get`);
                const mData = await mResponse.json();

                updateUI('l', lData);
                updateUI('m', mData);
            } catch (error) {
                console.error("Critical System Failure:", error);
            } finally {
                icon.classList.remove('spinning');
                btn.style.opacity = '1';
            }
        }

        function updateUI(prefix, data) {
            if (!data || data.length <= 1) return;
            
            // Total Visitors (rows minus header)
            document.getElementById(`${prefix}-vis`).innerText = data.length - 1;

            if (prefix === 'l') {
                let clk = 0, chr = 0;
                for(let i=1; i<data.length; i++) {
                    clk += Number(data[i][2]) || 0;
                    chr += Number(data[i][3]) || 0;
                }
                document.getElementById('l-clk').innerText = clk;
                document.getElementById('l-chr').innerText = chr;
            } else {
                let msg = 0, vid = 0, agn = 0, reg = 0;
                for(let i=1; i<data.length; i++) {
                    msg += Number(data[i][2]) || 0;
                    vid += Number(data[i][3]) || 0;
                    agn += Number(data[i][4]) || 0;
                    reg += Number(data[i][5]) || 0;
                }
                document.getElementById('m-msg').innerText = msg;
                document.getElementById('m-vid').innerText = vid;
                document.getElementById('m-agn').innerText = agn;
                document.getElementById('m-reg').innerText = reg;
            }
        }

        window.onload = fetchAllData;
        // Auto refresh every 2 minutes
        setInterval(fetchAllData, 120000);
    </script>
</body>
</html>
